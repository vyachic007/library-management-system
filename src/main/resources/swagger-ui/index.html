<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Library Management System API</title>

    <link rel="stylesheet"
          href="/webjars/swagger-ui/5.13.0/swagger-ui.css">
</head>

<body>
<div id="swagger-ui"></div>

<script src="/webjars/swagger-ui/5.13.0/swagger-ui-bundle.js"></script>
<script src="/webjars/swagger-ui/5.13.0/swagger-ui-standalone-preset.js"></script>

<script>
    window.onload = function () {
        SwaggerUIBundle({
            url: "/v3/api-docs",
            dom_id: "#swagger-ui",
            deepLinking: true,
            displayRequestDuration: true,
            persistAuthorization: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIStandalonePreset
            ],
            layout: "StandaloneLayout"
        });
    };
</script>
</body>
</html>
